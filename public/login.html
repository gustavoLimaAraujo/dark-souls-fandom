<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Souls Fandom - Login</title>
    <link rel="stylesheet" href="css/styles.css">

    <div class="tipografia"></div>

</head>
<body>
    
    <div class="header"></div>

    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>

    <section class="section-login">
        <form action="" class="formulario">
            <h1>Login</h1>
            <input type="email" placeholder="Insira o seu e-mail" id="ipt_email">
            <input type="password" placeholder="Insira o sua senha" id="ipt_senha">

            <button type="button" onclick="entrar()">Login</button>
            <p>Ainda não tem uma conta? <a href="cadastro.html">Registre-se</a></p>

        </form>
    </section>

    <div id="div_aguardar" class="loading-div">
        <img src="./assets/circle-loading.gif" id="loading-gif">
    </div>

    <div id="div_erros_login"></div>
    
    <script src="js/sessao.js"></script>
    <script src="js/componentesReutilizaveis.js"></script>
    <script src="js/validacaoLogin.js"></script>

</body>
</html>
