<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Souls Fandom</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body onload="listarMensagensAjuda()">
    
    <div class="header-home"></div>

    <div class="container-chat">
        <div class="introduction">
            <section class="section-introduction">
                <h1 class="title">
                    Bem-vindo ao Fórum de Ajuda
                </h1>
                <p class="sub-title">Não hesite! Peça ajuda para outros jogadores aqui!</p>
            </section>
            <section class="section-chat">
                <section class="section-mensage" id="container_mensage">
                    <div class="mensage user">
                        <h2 class="user">User</h2>
                        <p class="text-user" id="text_user"></p>
                    </div>
                </section>
                <section class="input">

                <form onsubmit="inserirMensagem(); event.preventDefault();">
                    <input type="text" placeholder="Digite sua mensagem" id="ipt_mensagem" required>
                    <button type="submit">
                        <img src="../assets/imgs/enviar-input.png" alt="Imagem de enviar">
                    </button>
                </form>

                </section>
            </section>
        </div>
    </div>

    <script src="../js/sessao.js"></script>
    <script src="../js/componentesReutilizaveis.js"></script>

    <script src="../js/forum/insercaoMensagensAjuda.js"></script>

</body>
</html>
