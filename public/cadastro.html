<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Souls Fandom - Cadastro</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body onload="listar()">
    <div class="header"></div>

    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>

    <section class="section-cadastro">
        <div class="formulario">
            <h1>Cadastro</h1>
            <input type="text" id="ipt_nome" placeholder="Insira o seu nome de usúario">
            <input type="email" id="ipt_email" placeholder="Insira o seu e-mail">
            <input type="password" id="ipt_senha" placeholder="Insira o sua senha">
            <input type="password" id="ipt_confirmacao_senha" placeholder="Reconfirme sua senha">

            <button type="button" onclick="cadastrar()">Cadastro</button>
            <p>Já possui uma conta? <a href="login.html">Entre!</a></p>
        </div>
        <!-- <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div> -->
    </section>

    <script src="js/componentesReutilizaveis.js"></script>

    <script src="/js/sessao.js"></script>
    <script src="js/validacaoCadastro.js">
    </script>
</body>
</html>
